<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>

    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>

    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="login-card" id="loginDiv">

            <h1 id="title">Contact Manager</h1>

            <p class="subtitle">Sign in to manage your contacts</p>

            <input
                type="text"
                id="loginName"
                placeholder="Username"
            />

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
            />

            <button
                type="button"
                id="loginButton"
                class="buttons"
                onclick="doLogin();"
            >
                Login
            </button>

            <span id="loginResult"></span>

            <div class="register-text">
                Don’t have an account?
                <a onclick="showRegister();">Register</a>
            </div>

        </div>

        </div id="RegisterDiv" class="login-card" style="display: none;">
            <h1 id="title">Create Account</h1>
            <p class="subtitle">Register to manage your contacts</p>
            <input type="text" id="firstName" placeholder="First Name" />
            <input type="text" id="lastName" placeholder="Last Name" />
            <input type="text" id="registerName" placeholder="Username" />
            <input type="password" id="RegisterPassword" placeholder="Password" />
            <input type="password" id="ConfirmPassword" placeholder="Confirm Password" />
            <button type="button" id="registerButton" class="buttons" onclick="doRegister();">Register</button>
            <span id="registerResult"></span>
            <div class="register-text">
                Already have an account?
                <a onclick="showLogin();">Login</a>
            </div>
        </div>
    </div>

</body>
</html>
