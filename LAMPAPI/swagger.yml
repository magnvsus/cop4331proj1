# Docs
paths:
  /Login.php:
    post:
      tags:
      - Users
      summary: Log in page for users
      description: Authenticates users
      operationId: loginPage
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: loginItem
        description: Login
        schema:
          $ref: '#/definitions/Login'
      responses:
        200:
          description: OK
        404:
          description: URL Not Found
        500:
          description: Server Error

  /AddContacts.php:
    post:
      tags:
      - Add Contacts
      summary: Add contacts
      operationId: contactAdd
      description: Adds contacts to contacts database
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: addItem
        description: Add contact
        schema:
          $ref: '#/definitions/Add'
      responses:
        200:
          description: OK
        404:
          description: URL Not Found
        500:
          descirption: Server Error

  /SearchContacts.php:
    post:
      tags:
      - Search Contacts
      summary: Searches for contacts
      operationId: contactSearch
      description: Searches contacts from contacts database
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: searchItem
        description: Contact Search
        schema:
          $ref: '#/definitions/Search'
      responses:
        200:
          description: OK
        404:
          description: URL Not Found
        500:
          description: Server Error

