# Docs
paths:
  /Login.php:
    post:
      tags:
      - Users
      summary: Log in page for users
      description: Authenticates users
      operationId: LoginPage
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: LoginItem
        description: Login
        schema:
          $ref: '#/definitions/Login'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/LoginResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/UnauthorizedResponse'   
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'
  
  /Regsiter.php:
    post:
      tags:
      - Users
      summary: Registers users 
      description: Registers users in database
      operationId: Register
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: Register
        description: Login
        schema:
          $ref: '#/definitions/Register'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GenericResponse'
        201:
          description: Created
          schema:
            $ref: '#/definitions/GenericResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestResponse'
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'

  /AddContact.php:
    post:
      tags:
      - Add Contacts
      summary: Add contacts
      operationId: contactAdd
      description: Adds contacts to contacts database
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: addItem
        description: Add contact
        schema:
          $ref: '#/definitions/Add'
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/GenericResponse'    
        400:
          descritpion: Bad Request
          schema:
            $ref: '#/definitions/RegistrationErrorResponse'
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'

  /SearchContact.php:
    post:
      tags:
      - Search Contacts
      summary: Searches for contacts
      operationId: contactSearch
      description: Searches contacts from contacts database
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: SearchItem
        description: Contact Search
        schema:
          $ref: '#/definitions/Search'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/SearchResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestResponse'
        404:
          description: Contact Not Found
          schema:
            $ref: '#/definitions/NotFoundResponse'
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'

  /DeleteContact.php:
    post:
      tags:
      - Delete Contacts
      summary: Deletes contacts 
      operationId: contactDelete
      description: Deletes contacts from contacts database
      produces:
      - application/json
      parameters:
      - in: body
        name: deleteItem
        description: Contact Deletion
        schema:
          $ref: '#/definitions/Delete'
      responses:
        204:
          description: No Content
          schema:
            $ref: '#/definitions/GenericResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestResponse'
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'

  /UpdateContact.php:
    post:
      tags:
      - Update Contacts
      summary: Updates contacts
      operationId: contactUpdate
      description: Updates contact information in database
      produces:
      - application/json
      parameters:
      - in: body
        name: updateItem
        description: Contact Update
        schema:
          $ref: '#/definitions/Update'
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/GenericResponse'
        400:
          description: Bad Request
          schema:
            $ref: '#/definitions/BadRequestResponse'
        500:
          description: Server Error
          schema:
            $ref: '#/definitions/ServerErrorResponse'


definitions:
  Contact:
    type: object
    properties:
      ContactID:
        type: integer
        example: 123
      FirstName:
        type: string
        example: John
      LastName:
        type: string
        example: Doe
      Phone:
        type: string
        example: 123-456-7890
      Email:
        type: string
        example: jdoe@email.com

  Login:
    type: object
    required:
    - Login
    - Password
    properties:
      Login:
        type: string
        example: UserName123
      Password:
        type: string
        example: Password123

  Login:
    type: object
    required:
    - FirstName
    - LastName
    - Login
    - Password
    properties:
      FirstName:
        type: string
        example: John
      LastName:
        type: string
        example: Doe
      Login:
        type: string
        example: UserName123
      Password:
        type: string
        example: Password123

  Add:
    type: object
    required:
    - UserID
    - FirstName
    - LastName
    - Phone
    - Email
    properties:
      UserID:
        type: integer
        example: 123
      FirstName:
        type: string
        example: John
      LastName:
        type: string
        example: Doe
      Phone:
        type: string
        example: 1234567890
      Email:
        type: string
        example: jdoe@Email.com

  Search:
    type: object
    required:
    - UserID
    - Search
    properties:
      UserID:
        type: integer
        example: 123
      Search:
        type: string
        example: John Doe

  
        
  Delete:
    type: object
    required:
    - UserID
    - ContactID
    properties:
      UserID:
        type: integer
        example: 123
      ContactID:
        type: integer
        example: 123

  Update:
    type: object
    required:
    - UserID
    - ContactID
    - FirstName
    - LastName
    - Phone
    - Email
    properties:
      UserID:
        type: integer
        example: 123
      ContactID:
        type: integer
        example: 123
      FirstName:
        type: string
        example: John
      LastName:
        type: string
        example: Doe
      Phone:
        type: string
        example: 123-456-7890
      Email:
        type: string
        example: jdoe@email.com

  #Responses:

  LoginResponse:
    type: object
    properties:
      UserID:
        type: integer
        example: 123
      FirstName:
        type: string
        example: John
      LastName:
        type: string
        example: Doe
      Error:
        type: string
        example: ""

  RegistrationErrorResponse:
    type: object
    properties:
      Error:
        type: string
        example: "Registration failed"

  SearchResponse:
    type: object
    properties:
      Results:
        type: array
        items:
          $ref: '#/definitions/Contact'
      Error:
        type: string
        example: ""

  GenericResponse:
    type: object
    properties:
      Error:
        type: string
        example: ""

  UnauthorizedResponse:
    type: object
    properties:
      Error:
        type: string
        example: "Invalid Credentials"

  BadRequestResponse:
    type: object
    properties:
      Error:
        type: string
        example: "All fields must be filled."

  ServerErrorResponse:
    type: object
    properties:
      Error:
        type: string
        example: "Internal server error."

  NotFoundResponse:
    type: object
    properties:
      Error:
        type: string
        example: "No Records Found"

host: aecm.site
basePATH: /LAMPAPI
schemes:
 - https
 - http

