definitions:
  Login:
    type: object
    required:
    - login
    - password
    properties:
      login:
        type: string
        example: UserName123
      password:
        type: string
        example: Password123

  Add:
    type: object
    required:
    - userId
    - firstName
    - lastName
    - phone
    - email
    properties:
      userID:
        type: integer
        example: 123
      firstName:
        type: string
        example: John
      lastName:
        type: string
        example: Doe
      phone:
        type: string
        example: 1234567890
      email:
        type: string
        example: jdoe@email.com

  Search:
    type: object
    required:
    - userId
    - search
    properties:
      userId:
        type: integer
        example: 123
      search:
        type: string
        example: John Doe


