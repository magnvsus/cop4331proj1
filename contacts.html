<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>

    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function()
        {
            readCookie();
        }, false);
    </script>
</head>

<body>

<h1 id="title">Contact Manager</h1>

<div id="loggedInDiv">
    <span id="userName"></span><br>
    <button type="button" id="logoutButton" class="buttons" onclick="doLogout();">
        Log Out
    </button>
</div>

<div id="accessUIDiv">

    <h2>Add Contact</h2>

    <input type="text" id="contactFirstName" placeholder="First Name">
    <input type="text" id="contactLastName" placeholder="Last Name">
    <input type="text" id="contactPhone" placeholder="Phone Number">
    <input type="text" id="contactEmail" placeholder="Email">

    <button type="button" class="buttons" onclick="addContact();">
        Add Contact
    </button>

    <span id="contactAddResult"></span>

    <hr>

    <h2>Search Contacts</h2>

    <input type="text" id="searchText" placeholder="Search by name, phone, or email">

    <button type="button" class="buttons" onclick="searchContact();">
        Search
    </button>

    <span id="contactSearchResult"></span>

    <div id="contactList"></div>

    <div id="editContactDiv" style="display:none;">
        <hr>

        <h2>Edit Contact</h2>

        <input type="hidden" id="editContactID">

        <input type="text" id="editFirstName" placeholder="First Name">
        <input type="text" id="editLastName" placeholder="Last Name">
        <input type="text" id="editPhone" placeholder="Phone Number">
        <input type="text" id="editEmail" placeholder="Email">

        <button type="button" class="buttons" onclick="updateContact();">
            Save Changes
        </button>
    </div>

</div>

</body>
</html>
